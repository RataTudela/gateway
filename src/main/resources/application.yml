server:
  port: 8081

spring:
  cloud:
    gateway:
      # CONFIGURACIÓN DE CORS INTEGRADA Y CORREGIDA
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      
      routes:
        # Microservicio de Usuarios y Recursos (Spring Boot)
        - id: usuarios-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/usuarios/**

        # Microservicio de Monitoreo y analitica (FastAPI)
        - id: monitoreo-service
          uri: http://localhost:8000
          predicates:
            - Path=/api/analisis/**

        # Microservicio de Gestion de Proyectos (Spring Boot)
        - id: proyectos-service
          uri: http://localhost:8067
          predicates:
            - Path=/api/proyectos/**

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false