server:
  port: 8081

spring:
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true # Esto ayuda a que el Gateway tome prioridad
            cors-configurations:
              '[/**]':
                allowedOrigins: "http://localhost:5173"
                allowedMethods: "*"
                allowedHeaders: "*"
      routes:
        #microservicio de Usuarios y Recursos (Spring Boot)
        - id: usuarios-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/usuarios/**

        #microservicio de Monitoreo y analitica (FastApi)
        - id: monitoreo-service
          uri: http://localhost:8000
          predicates:
            - Path=/api/analisis/**
        #microservicio de Gestion de Proyectos (Spring Boot)
        - id: proyectos-service
          uri: http://localhost:8067
          predicates:
            - Path=/api/proyectos/**

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false