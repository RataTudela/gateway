server:
  port: 8081

spring:
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true # Esto ayuda a que el Gateway tome prioridad
            cors-configurations:
              '[/**]':
                allowedOrigins: "http://localhost:5173"
                allowedMethods: "*"
                allowedHeaders: "*"
      routes:
        - id: usuarios-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/usuarios/**

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false